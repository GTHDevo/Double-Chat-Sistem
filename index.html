<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>2 Chat Hub 🔥</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.container {
  display: flex;
  height: 100vh;
}

/* LEFT */
.left {
  width: 25%;
  background: #151515;
  padding: 10px;
  overflow-y: auto;
}

.channel {
  padding: 10px;
  margin: 5px 0;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
}

/* RIGHT */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.top {
  display: flex;
  gap: 5px;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #ff0055;
  color: white;
  cursor: pointer;
}

/* VIDEO */
.video {
  height: 40%;
}

.video iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* CHATS */
.chats {
  flex: 1;
  display: flex;
}

.chat {
  flex: 1;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <h3>🔥 Önerdiğimiz Kanallar</h3>
    <div id="list"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="top">
      <input id="yt" placeholder="YouTube link">
      <input id="kick" placeholder="Kick kanal adı">
      <button onclick="start()">Aç</button>
    </div>

    <!-- 🎥 VIDEO -->
    <div class="video">
      <iframe id="videoFrame"></iframe>
    </div>

    <!-- 💬 CHATS -->
    <div class="chats">
      <div class="chat"><iframe id="kickFrame"></iframe></div>
      <div class="chat"><iframe id="ytFrame"></iframe></div>
    </div>

  </div>

</div>

<script>

/* 🔥 KANAL */
const channels = [
  {
    name: "MervanT",
    yt: "RrpDQKvbp_g",
    kick: "mervant0"
  }
];

const list = document.getElementById("list");

channels.forEach(c => {
  let div = document.createElement("div");
  div.className = "channel";
  div.innerText = c.name;

  div.onclick = () => openChannel(c);

  list.appendChild(div);
});

/* DOMAIN FIX 🔥 */
function getDomain() {
  if (location.hostname === "" || location.hostname === "127.0.0.1") {
    return "youtube.com"; // FIX
  }
  return location.hostname;
}

/* OPEN CHANNEL */
function openChannel(c) {

  // 🎥 VIDEO
  document.getElementById("videoFrame").src =
    `https://www.youtube.com/embed/${c.yt}`;

  // 💬 YT CHAT (FIXED)
  document.getElementById("ytFrame").src =
    `https://www.youtube.com/live_chat?v=${c.yt}&embed_domain=${getDomain()}`;

  // 🎮 KICK CHAT
  document.getElementById("kickFrame").src =
    `https://kick.com/popout/${c.kick}/chat`;
}

/* INPUT */
function start() {

  let yt = document.getElementById("yt").value.trim();
  let kick = document.getElementById("kick").value.trim();

  let ytID = extractID(yt);

  if (!ytID) {
    alert("❌ YT ID bulunamadı!");
    return;
  }

  document.getElementById("videoFrame").src =
    `https://www.youtube.com/embed/${ytID}`;

  document.getElementById("ytFrame").src =
    `https://www.youtube.com/live_chat?v=${ytID}&embed_domain=${getDomain()}`;

  document.getElementById("kickFrame").src =
    `https://kick.com/popout/${kick}/chat`;
}

/* YT ID */
function extractID(url) {
  let m = url.match(/v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];

  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];

  return null;
}

</script>

</body>
</html>
