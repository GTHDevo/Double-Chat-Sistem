<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>2 Chat Hub 🔥</title>
<title>By-Melih Gediz</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.container {
  display: flex;
  height: 100vh;
}

/* LEFT PANEL */
.left {
  width: 25%;
  background: #151515;
  padding: 10px;
  overflow-y: auto;
}

.channel {
  padding: 10px;
  margin: 5px 0;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
}

/* RIGHT PANEL */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.top {
  display: flex;
  gap: 5px;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #ff0055;
  color: white;
  cursor: pointer;
}

/* CHAT AREA */
.chats {
  flex: 1;
  display: flex;
  flex-direction: column;
}

iframe {
  flex: 1;
  border: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <h3>🔥 Önerdiğimiz Kanallar</h3>
    <div id="list"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="top">
      <input id="yt" placeholder="YouTube @kanal veya video link">
      <input id="kick" placeholder="Kick kanal adı">
      <button onclick="start()">Aç</button>
    </div>

    <div class="chats">
      <iframe id="ytFrame"></iframe>
      <iframe id="kickFrame"></iframe>
    </div>

  </div>

</div>

<script>

/* 🔥 KANAL LİSTESİ (BURAYI SONRA SEN DEĞİŞTİRECEKSİN) */
const channels = [
  {
    name: "MervanT",
    yt: "RrpDQKvbp_g",
    kick: "mervant0"
  }
];

/* LEFT PANEL */
const list = document.getElementById("list");

channels.forEach(c => {
  let div = document.createElement("div");
  div.className = "channel";
  div.innerText = c.name;

  div.onclick = () => {
    openChannel(c);
  };

  list.appendChild(div);
});

/* KANAL AÇ */
function openChannel(c) {

  let ytChat = `https://www.youtube.com/live_chat?v=${c.yt}&embed_domain=${window.location.hostname}`;
  let kickChat = `https://kick.com/popout/${c.kick}/chat`;

  document.getElementById("ytFrame").src = ytChat;
  document.getElementById("kickFrame").src = kickChat;
}

/* MANUEL INPUT */
function start() {

  let yt = document.getElementById("yt").value.trim();
  let kick = document.getElementById("kick").value.trim();

  if (!yt || !kick) {
    alert("⚠️ İkisini de gir!");
    return;
  }

  let ytID = extractID(yt);

  if (!ytID) {
    alert("❌ YouTube ID bulunamadı!");
    return;
  }

  document.getElementById("ytFrame").src =
    `https://www.youtube.com/live_chat?v=${ytID}&embed_domain=${window.location.hostname}`;

  document.getElementById("kickFrame").src =
    `https://kick.com/popout/${kick}/chat`;
}

/* YOUTUBE ID */
function extractID(url) {
  let m = url.match(/v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];

  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];

  return null;
}

</script>

</body>
</html>
