<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Chat Fusion 🔥</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

header {
  padding: 15px;
  background: #1a1a1a;
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #ff0055;
  color: white;
  cursor: pointer;
}

.container {
  display: flex;
  height: calc(100vh - 70px);
}

.chat {
  flex: 1;
  border-left: 1px solid #222;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Tema seçenekleri */
.dark { background: #0f0f0f; }
.neon { background: black; }
.neon button { background: #00ffcc; color: black; }
.light { background: #f5f5f5; color: black; }
.light header { background: #ddd; }
</style>
</head>

<body class="dark">

<header>
  <input id="yt" placeholder="YouTube popout link">
  <input id="kick" placeholder="Kick popout link">
  <button onclick="start()">Başlat</button>
  <button onclick="setTheme('dark')">Dark</button>
  <button onclick="setTheme('neon')">Neon</button>
  <button onclick="setTheme('light')">Light</button>
</header>

<div class="container">
  <div class="chat"><iframe id="ytFrame"></iframe></div>
  <div class="chat"><iframe id="kickFrame"></iframe></div>
</div>

<script>
function start() {
  let yt = document.getElementById("yt").value;
  let kick = document.getElementById("kick").value;

  if (!yt || !kick) {
    alert("⚠️ İki linki de girmeden başlatamazsın!");
    return;
  }

  document.getElementById("ytFrame").src = yt;
  document.getElementById("kickFrame").src = kick;
}

function setTheme(theme) {
  document.body.className = theme;
}
</script>

</body>
</html>
